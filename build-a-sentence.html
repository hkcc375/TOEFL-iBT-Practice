  { person1: "How has your sleeping pattern changed since starting college?", answer: "I stay up much later now and rarely get eight hours of sleep anymore" },
  { person1: "Did the team agree on a topic for the presentation?", answer: "We finally settled on one after debating for almost an entire hour" },
  { person1: "Are you planning to take the certification exam?", answer: "Yes it would really strengthen my resume and open up more job opportunities" },
  { person1: "Why do you think that restaurant closed down?", answer: "The food was good but the location was bad and they had very few customers" },
  { person1: "What was your favorite childhood memory?", answer: "Playing outside with my cousins during summer vacations was always the most fun" },
  { person1: "How do you pick which electives to take?", answer: "I look at student reviews and pick the ones that seem the most engaging" },
  { person1: "Did you get along with your host family abroad?", answer: "They were incredibly welcoming and treated me like part of their own family" },
  { person1: "Are you familiar with the new building on campus?", answer: "I walked by it yesterday but I have not been inside yet" },
  { person1: "Why do you always bring a snack to class?", answer: "I get hungry between meals and it helps me stay focused during lectures" },
  { person1: "What do you think of the new campus shuttle schedule?", answer: "It runs more frequently now which makes getting around campus much easier" },
  { person1: "How is the signal in your building?", answer: "It is really weak on the lower floors but fine if you go upstairs" },
  { person1: "Did your team win the trivia night?", answer: "We came in third which was not bad considering it was our first time" },
  { person1: "Are you going to the bookstore before it closes?", answer: "I should because I need to buy a notebook before classes start tomorrow" }
];

// Filter to questions with at most 14 words. Give each a stable ID.
const QUESTIONS_POOL = ALL_QUESTIONS
  .filter(q => q.answer.split(' ').length <= 14)
  .map((q, i) => ({ id: i, person1: q.person1, correct: q.answer.split(' ') }));

// --- Cross-session deduplication via localStorage ---
const STORAGE_KEY = 'toefl_seen_ids';
function getSeenIds() {
  try { return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')); }
  catch { return new Set(); }
}
function markSeen(id) {
  const seen = getSeenIds();
  seen.add(id);
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...seen]));
}
function resetSeen() {
  localStorage.removeItem(STORAGE_KEY);
}

// Session state
const TIME_LIMIT = 6 * 60; // 6 minutes in seconds
let queue = [];
let current = 0;
let startTime = Date.now();
let questionStart = Date.now();
let results = [];
let draggedEl = null;
let timerInterval = null;
let timeUp = false;

const timerEl = document.getElementById('timer');
const progressEl = document.getElementById('progress');
const person1El = document.getElementById('person1');
const answerZone = document.getElementById('answerZone');
const wordBank = document.getElementById('wordBank');
const feedbackEl = document.getElementById('feedback');
const submitBtn = document.getElementById('submitBtn');
const resetBtn = document.getElementById('resetBtn');

function fmt(s) {
  const m = Math.floor(s / 60).toString().padStart(2, '0');
  const sec = (s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}

function startTimer() {
  startTime = Date.now();
  timeUp = false;
  timerEl.className = '';
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const remaining = Math.max(0, TIME_LIMIT - elapsed);
    timerEl.textContent = fmt(remaining);
    if (remaining <= 30) timerEl.className = 'ending';
    else if (remaining <= 60) timerEl.className = 'warning';
    else timerEl.className = '';
    if (remaining <= 0) {
      clearInterval(timerInterval);
      timeUp = true;
      endSession();
    }
  }, 250);
}

function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffle(arr) {
  const a = shuffleArray(arr);
  if (a.join(' ') === arr.join(' ')) return shuffle(arr);
  return a;
}

function buildSession() {
  // Prioritize unseen questions; only recycle seen ones when pool is exhausted.
  const seen = getSeenIds();
  const unseen = QUESTIONS_POOL.filter(q => !seen.has(q.id));
  const seenQs = QUESTIONS_POOL.filter(q => seen.has(q.id));
  // If all questions have been seen, reset history so everything feels fresh again.
  if (unseen.length === 0) {
    resetSeen();
    queue = shuffleArray(QUESTIONS_POOL);
  } else {
    // Unseen first (shuffled), then seen as backup (shuffled).
    queue = shuffleArray(unseen).concat(shuffleArray(seenQs));
  }
  current = 0;
  results = [];
  timeUp = false;
  if (timerInterval) clearInterval(timerInterval);
}

function createWord(text) {
  const el = document.createElement('div');
  el.className = 'word';
  el.textContent = text;
  el.draggable = true;
  el.addEventListener('dragstart', e => {
    draggedEl = el;
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    draggedEl = null;
  });
  el.addEventListener('click', () => {
    if (el.parentElement === wordBank) answerZone.appendChild(el);
    else wordBank.appendChild(el);
  });
  return el;
}

function setupDropZone(zone) {
  zone.addEventListener('dragover', e => {
    e.preventDefault();
    zone.classList.add('over');
    if (!draggedEl) return;
    const after = getDragAfterElement(zone, e.clientX, e.clientY);
    if (after == null) {
      if (draggedEl.parentElement !== zone || draggedEl.nextSibling !== null) {
        zone.appendChild(draggedEl);
      }
    } else if (after !== draggedEl && after !== draggedEl.nextSibling) {
      zone.insertBefore(draggedEl, after);
    }
  });
  zone.addEventListener('dragleave', e => {
    if (e.target === zone) zone.classList.remove('over');
  });
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('over');
  });
}
function getDragAfterElement(container, x, y) {
  const els = [...container.querySelectorAll('.word:not(.dragging)')];
  let best = { dist: Infinity, element: null };
  for (const child of els) {
    const box = child.getBoundingClientRect();
    if (y < box.top - 4 || y > box.bottom + 4) continue;
    const offset = x - (box.left + box.width / 2);
    if (offset < 0) {
      const d = Math.abs(offset);
      if (d < best.dist) best = { dist: d, element: child };
    }
  }
  return best.element;
}
setupDropZone(answerZone);
setupDropZone(wordBank);

function loadQuestion() {
  if (timeUp) return;
  const q = queue[current % queue.length]; // wrap around if we exhaust the pool
  progressEl.textContent = `Question ${current + 1}`;
  person1El.textContent = q.person1;
  answerZone.innerHTML = '';
  wordBank.innerHTML = '';
  feedbackEl.style.display = 'none';
  submitBtn.textContent = 'Submit';
  submitBtn.disabled = false;
  shuffle(q.correct).forEach(w => wordBank.appendChild(createWord(w)));
  questionStart = Date.now();
}

function endSession() {
  // If user is mid-question, don't count it.
  submitBtn.disabled = true;
  showReport();
}

submitBtn.addEventListener('click', () => {
  if (timeUp) return;
  if (submitBtn.textContent === 'Next') {
    current++;
    loadQuestion();
    return;
  }
  const q = queue[current % queue.length];
  const userWords = [...answerZone.querySelectorAll('.word')].map(e => e.textContent);
  const correct = q.correct;
  const timeSpent = Math.round((Date.now() - questionStart) / 1000);
  const isCorrect = userWords.length === correct.length &&
                    userWords.every((w, i) => w === correct[i]);

  [...answerZone.querySelectorAll('.word')].forEach((el, i) => {
    el.classList.add(el.textContent === correct[i] ? 'correct' : 'incorrect');
    el.draggable = false;
  });
  [...wordBank.querySelectorAll('.word')].forEach(el => el.draggable = false);

  feedbackEl.style.display = 'block';
  if (isCorrect) {
    feedbackEl.className = 'correct';
    feedbackEl.innerHTML = `<strong>Correct!</strong> Time: ${timeSpent}s — moving on…`;
  } else {
    feedbackEl.className = 'incorrect';
    feedbackEl.innerHTML = `<strong>Not quite.</strong> Correct answer: "${correct.join(' ')}"<br>Time: ${timeSpent}s`;
  }
  results.push({
    question: q.person1,
    userAnswer: userWords.join(' '),
    correctAnswer: correct.join(' '),
    isCorrect,
    timeSpent
  });
  markSeen(q.id);

  submitBtn.disabled = true;
  if (isCorrect) {
    setTimeout(() => {
      if (timeUp) return;
      submitBtn.disabled = false;
      current++;
      loadQuestion();
    }, 1200);
  } else {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Next';
  }
});

resetBtn.addEventListener('click', loadQuestion);

function showReport() {
  document.getElementById('quiz').style.display = 'none';
  const report = document.getElementById('report');
  report.style.display = 'block';
  const elapsed = Math.min(TIME_LIMIT, Math.round((Date.now() - startTime) / 1000));
  const correctCount = results.filter(r => r.isCorrect).length;
  const avgTime = results.length ? Math.round(results.reduce((s,r) => s + r.timeSpent, 0) / results.length) : 0;

  document.getElementById('summary').innerHTML =
    `<div style="font-size:22px;margin-bottom:6px;"><strong>${correctCount} / ${results.length} correct</strong></div>` +
    `<strong>Questions attempted:</strong> ${results.length} in ${fmt(elapsed)}<br>` +
    `<strong>Accuracy:</strong> ${results.length ? Math.round(correctCount/results.length*100) : 0}%<br>` +
    `<strong>Avg time per question:</strong> ${avgTime}s`;
  const details = document.getElementById('reportDetails');
  details.innerHTML = results.map((r, i) => `
    <div class="report-row">
      <div class="q"><strong>Q${i+1}:</strong> ${r.question}<br>
        <span style="color:#6b7280;font-size:13px;">Your answer: ${r.userAnswer || '(empty)'}</span><br>
        ${!r.isCorrect ? `<span style="color:#059669;font-size:13px;">Correct: ${r.correctAnswer}</span>` : ''}
      </div>
      <div class="result ${r.isCorrect ? 'ok' : 'bad'}">
        ${r.isCorrect ? '✓' : '✗'}<br>
        <span style="font-size:12px;font-weight:400;color:#6b7280;">${r.timeSpent}s</span>
      </div>
    </div>
  `).join('');
}

function confirmExit() {
  if (confirm('Are you sure you want to exit? Your current progress will not be saved.')) {
    // Clean up timer, disable controls, and navigate away
    clearInterval(timerInterval);
    timeUp = true;
    submitBtn.disabled = true;
    resetBtn.disabled = true;
    draggedEl = null;
    window.location.href = 'index.html';
  }
}

document.getElementById('restartBtn').addEventListener('click', () => {
  buildSession();
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('report').style.display = 'none';
  startTimer();
  loadQuestion();
});

buildSession();
startTimer();
loadQuestion();
</script>
